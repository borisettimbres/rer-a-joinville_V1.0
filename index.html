<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIEL RER A - Joinville-le-Pont</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red-a: #c0333a; 
            --dark: #000000;
            --yellow: #fbc02d; 
            --bg-page: #f5f5f5;
            --grey-border: #666;
            --grey-bg: #eee;
            --info-bg: #d0dce4;
            --info-text: #1a3144;
            --ok-color: #00ff00;
            --ko-color: #ff4444;
        }
        body { background: var(--bg-page); font-family: 'Cabin', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--red-a); z-index: 10; }
        .header-left { display: flex; align-items: center; }
        .logos-container { display: flex; gap: 8px; align-items: center; }
        .logo-rer { background: white; border: 2.5px solid var(--dark); border-radius: 8px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; }
        .logo-a { background: var(--red-a); border-radius: 8px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 900; color: white; }
        .station-info { margin-left: 15px; }
        .station-name { font-size: 26px; font-weight: bold; color: var(--dark); }
        .direction-info { font-size: 16px; color: var(--red-a); font-weight: bold; }
        .clock { background: var(--dark); color: var(--yellow); padding: 10px 22px; border-radius: 8px; font-size: 28px; font-weight: bold; }
        
        .board { flex-grow: 1; padding: 0 20px; overflow: hidden; }

        .row { 
            display: grid; 
            grid-template-columns: 100px 1fr 240px 100px; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 2px solid #ddd;
            height: 70px;
            transition: all 0.6s ease;
        }

        /* Animation de sortie pour le train qui part */
        .row.exit-left { transform: translateX(-100%); opacity: 0; }

        .mission { background: #ddd; padding: 6px; border-radius: 4px; text-align: center; font-weight: bold; font-family: monospace; font-size: 16px; }
        .dest { font-size: 28px; font-weight: 700; padding-left: 15px; color: var(--dark); }
        
        /* --- ANIMATION DU TEMPS --- */
        @keyframes flashUpdate {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-text { animation: flashUpdate 0.6s ease-out; }

        .blinking { animation: blinker 1.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.2; } }

        .time { background: var(--dark); color: var(--yellow); border-radius: 8px; text-align: center; width: 210px; height: 60px; display: flex; justify-content: center; align-items: center; justify-self: center; }
        .time-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .time .val { font-size: 34px; font-weight: bold; line-height: 0.8; }
        .time .unit { font-size: 14px; text-transform: lowercase; font-weight: bold; }
        .time .full-text { font-size: 24px; font-weight: bold; text-transform: uppercase; }

        .platform-box { background: var(--grey-bg); border: 2.5px solid var(--grey-border); border-radius: 8px; width: 60px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--dark); margin-left: auto;}
        .platform-text { font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .platform-num { font-size: 24px; font-weight: 900; }

        .info-trafic { background: var(--info-bg); height: 110px; display: flex; align-items: center; padding: 0 30px; border-top: 2px solid #b8c5ce; }
        .info-text { font-size: 24px; font-weight: 700; color: var(--info-text); flex-grow: 1; }

        footer { background: #333; color: #aaa; padding: 10px 20px; font-family: monospace; font-size: 11px; display: flex; justify-content: space-between; }
        .api-ok { color: var(--ok-color); }
        .api-ko { color: var(--ko-color); }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="logos-container"><div class="logo-rer">RER</div><div class="logo-a">A</div></div>
        <div class="station-info">
            <div class="station-name">JOINVILLE-LE-PONT</div>
            <div class="direction-info">Paris · St-Germain-en-Laye · Poissy · Cergy</div>
        </div>
    </div>
    <div class="clock" id="clock">--:--</div>
</header>

<div class="board" id="board"></div>

<div class="info-trafic">
    <div class="info-text" id="traffic-message">Chargement du trafic...</div>
</div>

<footer>
    <div id="debug-schedules">> SIEL : Initialisation...</div>
    <div id="debug-traffic">API Trafic : --</div>
</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const MONITORING_REF = 'STIF:StopArea:SP:70640:';
    
    let currentTrains = [];
    let lastStatusMap = {}; 
    let isDepartureLocked = false;

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    async function fetchSchedules() {
        const debug = document.getElementById('debug-schedules');
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${MONITORING_REF}`;
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;

        try {
            const response = await fetch(proxy, { headers: { 'apiKey': API_KEY, 'Accept': 'application/json' } });
            const data = await response.json();
            const visits = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]?.MonitoredStopVisit || [];
            
            processUpdate(visits);
            debug.innerHTML = `<span class="api-ok">> SIEL OK - ${new Date().toLocaleTimeString()}</span>`;
        } catch (e) {
            debug.innerHTML = `<span class="api-ko">> SIEL ERREUR</span>`;
        } finally {
            setTimeout(fetchSchedules, 10000); // Rappel toutes les 10 secondes
        }
    }

    function processUpdate(visits) {
        const now = new Date();
        const seen = new Set();

        const filtered = visits.map(v => v.MonitoredVehicleJourney).filter(j => {
            const expTime = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            const diffSec = (expTime - now) / 1000;

            // --- ANTI TRAIN FANTÔME ---
            // Si le train est passé depuis plus de 45 secondes, on l'ignore, même si l'API dit qu'il est là.
            if (diffSec < -45) return false;

            const dest = j.DestinationName[0].value;
            const key = mission = j.JourneyNote?.[0]?.value + j.MonitoredCall.AimedDepartureTime;
            
            if (seen.has(key)) return false;
            seen.add(key);

            return !dest.toLowerCase().includes('boissy') && !dest.toLowerCase().includes('varenne');
        })
        .sort((a, b) => new Date(a.MonitoredCall.ExpectedDepartureTime || a.MonitoredCall.AimedDepartureTime) - new Date(b.MonitoredCall.ExpectedDepartureTime || b.MonitoredCall.AimedDepartureTime))
        .slice(0, 6);

        // Détection de départ (si le premier train n'est plus le même)
        if (!isDepartureLocked && currentTrains.length > 0 && filtered.length > 0) {
            const oldId = currentTrains[0].FramedVehicleJourneyRef?.DatedVehicleJourneyRef;
            const newId = filtered[0].FramedVehicleJourneyRef?.DatedVehicleJourneyRef;
            
            if (oldId && newId && oldId !== newId) {
                animateDeparture(filtered);
                return;
            }
        }

        if (!isDepartureLocked) render(filtered);
    }

    function animateDeparture(newTrains) {
        const firstRow = document.querySelector('.row');
        if (firstRow) {
            isDepartureLocked = true;
            firstRow.classList.add('exit-left');
            setTimeout(() => {
                isDepartureLocked = false;
                render(newTrains);
            }, 600);
        } else {
            render(newTrains);
        }
    }

    function render(trains) {
        const board = document.getElementById('board');
        const now = new Date();
        let html = '';

        trains.forEach((j) => {
            const mission = j.JourneyNote?.[0]?.value || "----";
            const dest = formatDestination(j.DestinationName[0].value);
            const expTime = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            const diffSec = Math.floor((expTime - now) / 1000);
            const diffMin = Math.ceil(diffSec / 60);
            const isAtStop = j.MonitoredCall.VehicleAtStop === true || j.MonitoredCall.VehicleAtStop === "true";
            
            const trainId = j.FramedVehicleJourneyRef?.DatedVehicleJourneyRef || mission;

            let statusText = "";
            let timeHtml = "";
            let statusClass = "";

            // --- LOGIQUE DE STATUT ÉVOLUÉE ---
            if (isAtStop || diffSec <= 5) {
                statusText = "QUAI";
                timeHtml = `<span class="full-text">À quai</span>`;
            } else if (diffSec <= 35) {
                statusText = "APPROCHE";
                timeHtml = `<span class="full-text blinking">À l'approche</span>`;
            } else {
                statusText = `${diffMin} min`;
                timeHtml = `<span class="val">${diffMin}</span><span class="unit">min</span>`;
            }

            // --- TRIGGER ANIMATION SI CHANGEMENT ---
            const hasChanged = lastStatusMap[trainId] !== undefined && lastStatusMap[trainId] !== statusText;
            const animClass = hasChanged ? 'animate-text' : '';
            lastStatusMap[trainId] = statusText;

            const platform = j.MonitoredCall.DeparturePlatformName?.value || "2";

            html += `
                <div class="row">
                    <div class="mission">${mission}</div>
                    <div class="dest">${dest}</div>
                    <div class="time">
                        <div class="time-wrapper ${animClass}">
                            ${timeHtml}
                        </div>
                    </div>
                    <div class="platform-box">
                        <span class="platform-text">Quai</span>
                        <span class="platform-num">${platform}</span>
                    </div>
                </div>`;
        });

        board.innerHTML = html || '<div style="color:#999; text-align:center; padding-top:50px;">Aucun train à l\'approche</div>';
        currentTrains = trains;
    }

    function formatDestination(text) {
        let clean = text.replace(/GARE DE /gi, '').trim();
        return clean;
    }

    // Lancement
    updateClock();
    setInterval(updateClock, 1000);
    fetchSchedules(); 
</script>
</body>
</html>
