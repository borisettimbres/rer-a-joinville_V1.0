<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau des Départs Dynamique</title>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        :root {
            --bg-color: #0d0d0d;
            --row-bg: #1a1a1a;
            --accent-color: #ffcc00;
            --text-color: #eee;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .board-container {
            width: 100%;
            max-width: 700px;
        }

        h1 {
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
        }

        /* --- STRUCTURE DE LA LISTE --- */
        .train-list {
            position: relative; /* Nécessaire pour le positionnement absolute des éléments sortants */
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .train-row {
            background: var(--row-bg);
            margin-bottom: 8px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            box-sizing: border-box;
            width: 100%;
            height: 70px; /* Hauteur fixe pour une animation de remontée plus stable */
        }

        .train-info {
            display: flex;
            gap: 20px;
        }

        .time {
            color: var(--accent-color);
            font-weight: bold;
            font-family: monospace;
            font-size: 1.2rem;
        }

        .destination {
            font-weight: 500;
        }

        button {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 15px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
        }

        button:hover {
            background: var(--accent-color);
            color: black;
        }

        /* --- ANIMATIONS VUE.JS (LA MAGIE) --- */

        /* 1. Animation de sortie (Slide Out) */
        .list-leave-active {
            transition: all 0.6s cubic-bezier(0.5, 0, 0.1, 1);
            position: absolute; /* On sort l'élément du flux pour que les autres remontent immédiatement */
            z-index: 0;
        }

        .list-leave-to {
            opacity: 0;
            transform: translateX(-100%); /* Le train part vers la gauche */
        }

        /* 2. Animation de remontée (Move) */
        /* S'applique à tous les éléments qui ne sont pas en train de partir */
        .list-move {
            transition: transform 0.6s cubic-bezier(0.5, 0, 0.1, 1);
        }

        /* Optionnel : Animation d'entrée si tu ajoutes des trains */
        .list-enter-from {
            opacity: 0;
            transform: translateY(30px);
        }
        .list-enter-active {
            transition: all 0.5s ease;
        }
    </style>
</head>
<body>

<div id="app" class="board-container">
    <h1>Prochains Départs 🚄</h1>
    
    <transition-group name="list" tag="div" class="train-list">
        <div v-for="train in trains" :key="train.id" class="train-row">
            <div class="train-info">
                <span class="time">{{ train.heure }}</span>
                <span class="destination">{{ train.destination }}</span>
            </div>
            <button @click="departTrain(train.id)">DÉPART</button>
        </div>
    </transition-group>

    <div v-if="trains.length === 0" style="text-align: center; margin-top: 40px; color: #666;">
        <p>Tous les trains sont partis. <br> 
           <button @click="resetBoard" style="margin-top: 10px;">Réinitialiser le tableau</button>
        </p>
    </div>
</div>

<script>
    const { createApp, ref } = Vue;

    createApp({
        setup() {
            // Données initiales
            const initialData = [
                { id: 1, heure: '14:32', destination: 'LONDON ST-PANCRAS' },
                { id: 2, heure: '14:45', destination: 'PARIS GARE DU NORD' },
                { id: 3, heure: '15:05', destination: 'BRUXELLES MIDI' },
                { id: 4, heure: '15:20', destination: 'AMSTERDAM CENTRAAL' },
                { id: 5, heure: '15:50', destination: 'LYON PART-DIEU' }
            ];

            const trains = ref([...initialData]);

            const departTrain = (id) => {
                // On filtre la liste pour enlever le train sélectionné
                trains.value = trains.value.filter(t => t.id !== id);
            };

            const resetBoard = () => {
                trains.value = [...initialData];
            };

            return {
                trains,
                departTrain,
                resetBoard
            };
        }
    }).mount('#app');
</script>

</body>
</html>
