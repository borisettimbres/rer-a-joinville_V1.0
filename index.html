<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIEL RER A - Joinville-le-Pont</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red-a: #c0333a; 
            --dark: #000000;
            --yellow: #fbc02d; 
            --bg-page: #f5f5f5;
            --grey-border: #666;
            --grey-bg: #eee;
            --info-bg: #d0dce4;
            --info-text: #1a3144;
            --ok-color: #00ff00;
            --ko-color: #ff4444;
        }
        body { background: var(--bg-page); font-family: 'Cabin', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--red-a); z-index: 10; }
        
        .header-left { display: flex; align-items: center; }
        .logos-container { display: flex; gap: 8px; align-items: center; }
        
        .logo-rer {
            background: white; border: 2.5px solid var(--dark); border-radius: 8px;
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 900; color: var(--dark); box-sizing: border-box;
        }
        
        .logo-a {
            background: var(--red-a); border-radius: 8px;
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            font-size: 36px; font-weight: 900; color: white; box-sizing: border-box;
        }
        
        .station-info { margin-left: 15px; }
        .station-name { font-size: 26px; font-weight: bold; line-height: 1; letter-spacing: -0.5px; color: var(--dark); }
        .direction-info { font-size: 16px; color: var(--red-a); margin-top: 4px; font-weight: bold; letter-spacing: -0.2px; }
        
        .clock { background: var(--dark); color: var(--yellow); padding: 10px 22px; border-radius: 8px; font-size: 28px; font-weight: bold; }
        
        .board { flex-grow: 1; padding: 0 20px; overflow: hidden; display: flex; flex-direction: column; }
        
        .row { 
            display: grid; 
            grid-template-columns: 100px 1fr 240px 100px; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 2px solid #ddd;
            background: var(--bg-page);
            transition: transform 0.6s ease-in, opacity 0.5s ease-in, height 0.6s ease;
            height: 70px;
            overflow: hidden;
        }

        /* Animation de sortie vers la gauche pour le train qui part */
        .row.exit-left {
            transform: translateX(-120%);
            opacity: 0;
            height: 0;
            padding: 0;
            border-bottom: none;
        }

        @keyframes slideInFromBottom {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .row.new-row { animation: slideInFromBottom 0.5s ease-out forwards; }

        .mission { background: #ddd; padding: 6px; border-radius: 4px; text-align: center; font-weight: bold; font-family: monospace; font-size: 16px; }
        .dest { font-size: 28px; font-weight: 700; padding-left: 15px; color: var(--dark); }
        
        /* Animation du changement de texte (temps) */
        @keyframes slideUpIn {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .animate-text { animation: slideUpIn 0.4s ease-out; }
        
        .blinking { animation: blinker 1.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        .time { background: var(--dark); color: var(--yellow); border-radius: 8px; text-align: center; width: 210px; height: 60px; display: flex; justify-content: center; align-items: center; justify-self: center; overflow: hidden; }
        .time-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .time .val, .time .full-text { font-size: 30px; font-weight: bold; line-height: 0.85; text-transform: uppercase; }
        .time .unit { font-size: 14px; margin-top: 4px; text-transform: lowercase; font-weight: bold; }

        .platform { display: flex; justify-content: center; border-left: 1px solid #ccc; padding-left: 10px; }
        .platform-box { background: var(--grey-bg); border: 2.5px solid var(--grey-border); border-radius: 8px; width: 60px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; color: var(--dark); }
        .platform-text { font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .platform-num { font-size: 24px; font-weight: 900; }

        .info-trafic { background: var(--info-bg); height: 110px; display: flex; align-items: center; padding: 0 30px; position: relative; z-index: 5; border-top: 2px solid #b8c5ce; overflow: hidden; }
        .info-icon-container { margin-right: 35px; flex-shrink: 0; display: flex; align-items: center; }
        .icon-info-blue { width: 45px; height: 45px; background: white; border: 3px solid #1a3144; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; color: #1a3144; }
        .logo-incident { position: relative; display: none; }
        .logo-incident .logo-box { background: #c0333a; color: white; width: 45px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; }
        .logo-status-x { position: absolute; bottom: -5px; right: -8px; background: #000; color: white; width: 20px; height: 20px; border-radius: 4px; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
        
        .logo-works { position: relative; display: none; width: 60px; height: 60px; }
        .logo-works .logo-a-box { background: var(--red-a); color: white; width: 45px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; position: absolute; top: 0; left: 0; }
        .logo-status-cone { position: absolute; bottom: -5px; right: -10px; width: 32px; height: 32px; background: url('https://upload.wikimedia.org/wikipedia/commons/3/3b/Road_works.svg') no-repeat center; background-size: contain; }

        .info-scroll-container { flex-grow: 1; height: 100%; display: flex; align-items: center; overflow: hidden; position: relative; }
        .info-text { font-size: 24px; font-weight: 700; color: var(--info-text); width: 100%; transition: transform 0.5s ease-in-out, opacity 0.5s; opacity: 1; transform: translateY(0); }
        .slide-up-exit { transform: translateY(-100%); opacity: 0; }
        .slide-up-enter { transform: translateY(100%); opacity: 0; }
        .time-box { background: #333; color: white; padding: 2px 6px; border-radius: 4px; font-family: monospace; }

        footer { background: #333; color: #aaa; padding: 10px 20px; font-family: monospace; font-size: 11px; z-index: 10; display: flex; justify-content: space-between; }
        .api-ok { color: var(--ok-color); font-weight: bold; }
        .api-ko { color: var(--ko-color); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="logos-container"><div class="logo-rer">RER</div><div class="logo-a">A</div></div>
        <div class="station-info">
            <div class="station-name">JOINVILLE-LE-PONT</div>
            <div class="direction-info">Paris · St-Germain-en-Laye · Poissy · Cergy</div>
        </div>
    </div>
    <div class="clock" id="clock">--:--</div>
</header>

<div class="board" id="board"></div>

<div class="info-trafic" id="info-trafic-bar">
    <div class="info-icon-container">
        <div id="icon-standard" class="icon-info-blue">i</div>
        <div id="icon-incident" class="logo-incident"><div class="logo-box">!</div><div class="logo-status-x">×</div></div>
        <div id="icon-works" class="logo-works"><div class="logo-a-box">A</div><div class="logo-status-cone"></div></div>
    </div>
    <div class="info-scroll-container">
        <div class="info-text" id="traffic-message">Connexion au réseau PRIM...</div>
    </div>
</div>

<footer>
    <div id="debug-schedules">> SIEL : Initialisation...</div>
    <div id="debug-traffic">API Info Trafic : --</div>
</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const MONITORING_REF = 'STIF:StopArea:SP:70640:'; 
    const DEFAULT_MSG = "Attentifs, ensemble • Ne pas se séparer de ses effets personnels • Signaler tout objet abandonné ou situation inhabituelle";

    let currentTrainsData = [];
    let lastStatusMap = {}; // Stocke le dernier statut affiché pour chaque train (par son ID)
    let isAnimatingDeparture = false;
    let displayQueue = [{text: DEFAULT_MSG, type: 'default'}];
    let queueIndex = 0;

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    /** API TRAFIC **/
    async function fetchGlobalTraffic() {
        const debugNode = document.getElementById('debug-traffic');
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/general-message?LineRef=STIF:Line::C01742:`;
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        try {
            const response = await fetch(proxy, { headers: { 'apiKey': API_KEY, 'Accept': 'application/json' } });
            if (!response.ok) return;
            const data = await response.json();
            const messages = data.Siri?.ServiceDelivery?.GeneralMessageDelivery?.[0]?.InfoMessage || [];
            let newQueue = [{text: DEFAULT_MSG, type: 'default'}];
            messages.forEach(m => {
                const lineRefs = m.Content?.LineRef || [];
                if (lineRefs.some(line => line.value.includes('C01742'))) {
                    const channel = m.InfoChannelRef?.value;
                    const msgs = m.Content?.Message || [];
                    const short = msgs.find(msg => msg.MessageType === "SHORT_MESSAGE");
                    const text = short ? short.MessageText.value : (msgs[0]?.MessageText?.value || "");
                    if (text) {
                        let type = (channel === "Perturbation" || channel === "PlannedWork") ? 'works' : 'incident';
                        newQueue.push({text: text, type: type});
                    }
                }
            });
            displayQueue = Array.from(new Set(newQueue.map(a => JSON.stringify(a)))).map(a => JSON.parse(a));
            debugNode.innerHTML = '<span class="api-ok">API TRAFFIC OK</span>';
        } catch (e) { debugNode.innerHTML = '<span class="api-ko">API TRAFFIC : ERREUR</span>'; }
    }

    function rotateMessage() {
        const txtNode = document.getElementById('traffic-message');
        const iconStd = document.getElementById('icon-standard');
        const iconInc = document.getElementById('icon-incident');
        const iconWorks = document.getElementById('icon-works');
        if (displayQueue.length === 0) return;
        txtNode.classList.add('slide-up-exit');
        setTimeout(() => {
            if (queueIndex >= displayQueue.length) queueIndex = 0;
            const current = displayQueue[queueIndex];
            txtNode.innerHTML = current.text.replace(/(\d{1,2}h\d{2}|\d{1,2}:\d{2})/g, '<span class="time-box">$1</span>');
            iconStd.style.display = 'none'; iconInc.style.display = 'none'; iconWorks.style.display = 'none';
            if (current.type === 'default') iconStd.style.display = 'flex';
            else if (current.type === 'incident') iconInc.style.display = 'block';
            else if (current.type === 'works') iconWorks.style.display = 'block';
            txtNode.classList.remove('slide-up-exit'); txtNode.classList.add('slide-up-enter');
            txtNode.offsetHeight; txtNode.classList.remove('slide-up-enter');
            queueIndex = (queueIndex + 1) % displayQueue.length;
        }, 500);
    }

    /** API PROCHAINS PASSAGES (MODIFIÉ POUR 10S RÉCURSIF) **/
    async function fetchSchedules() {
        const debug = document.getElementById('debug-schedules');
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${MONITORING_REF}`;
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        
        try {
            const response = await fetch(proxy, { headers: { 'apiKey': API_KEY, 'Accept': 'application/json' } });
            if (!response.ok) throw new Error("Erreur HTTP");
            const data = await response.json();
            const visits = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]?.MonitoredStopVisit || [];
            processUpdate(visits);
            debug.innerHTML = `> SIEL OK - ${new Date().toLocaleTimeString()}`;
        } catch (e) { 
            debug.innerHTML = '<span class="api-ko">> SIEL ERREUR RÉSEAU</span>'; 
        } finally {
            // Relance automatique dans 10 secondes exactement après la fin de la requête
            setTimeout(fetchSchedules, 10000);
        }
    }

    function processUpdate(visits) {
        const now = new Date();
        const seen = new Set();
        
        let newTrains = visits.map(v => v.MonitoredVehicleJourney).filter(j => {
            const line = j.LineRef?.value || "";
            if (!line.includes('C01742') && line !== 'A') return false;
            
            const expTime = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            
            // LOGIQUE TTL : Si le train est passé depuis > 30s, on le supprime (Bug fix)
            if ((now - expTime) > 30000) return false;

            const uniqueKey = `${j.DestinationName[0].value}_${j.MonitoredCall.AimedDepartureTime}`;
            if (seen.has(uniqueKey)) return false;
            seen.add(uniqueKey);
            
            const destName = j.DestinationName[0].value.toLowerCase();
            return !destName.includes('boissy') && !destName.includes('varenne');
        }).sort((a, b) => new Date(a.MonitoredCall.ExpectedDepartureTime || a.MonitoredCall.AimedDepartureTime) - new Date(b.MonitoredCall.ExpectedDepartureTime || b.MonitoredCall.AimedDepartureTime)).slice(0, 7);

        // Animation si le premier train de la liste a changé
        if (!isAnimatingDeparture && currentTrainsData.length > 0 && newTrains.length > 0) {
            const oldId = currentTrainsData[0].FramedVehicleJourneyRef?.DatedVehicleJourneyRef;
            const newId = newTrains[0].FramedVehicleJourneyRef?.DatedVehicleJourneyRef;
            if (oldId !== newId) {
                triggerDepartureAnimation(newTrains);
                return;
            }
        }
        
        if (!isAnimatingDeparture) render(newTrains);
    }

    function triggerDepartureAnimation(newTrains) {
        const firstRow = document.querySelector('.row');
        if (firstRow) {
            isAnimatingDeparture = true;
            firstRow.classList.add('exit-left');
            setTimeout(() => { 
                isAnimatingDeparture = false; 
                render(newTrains); 
            }, 600);
        } else { render(newTrains); }
    }

    function render(trains) {
        const board = document.getElementById('board');
        const now = new Date();
        let html = '';
        
        if (trains.length === 0) { 
            board.innerHTML = '<div style="text-align:center;margin-top:100px;color:#999;">Aucun train détecté.</div>'; 
            currentTrainsData = []; 
            return; 
        }
        
        trains.forEach((j) => {
            const mission = j.JourneyNote?.[0]?.value || "----";
            const dest = formatDestination(j.DestinationName[0].value);
            const time = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            
            const diffInSec = Math.round((time - now) / 1000);
            const diffInMin = Math.ceil(diffInSec / 60);
            
            const isAtStop = j.MonitoredCall.VehicleAtStop === true || j.MonitoredCall.VehicleAtStop === "true";
            const trainId = j.FramedVehicleJourneyRef?.DatedVehicleJourneyRef || mission + j.MonitoredCall.AimedDepartureTime;

            let currentStatus = "";
            let timeHTML = "";
            let statusClass = "";
            
            // Détermination du statut précis
            if (isAtStop || diffInSec <= -5) {
                currentStatus = "QUAI";
                timeHTML = `<span class="full-text">À quai</span>`;
            } else if (diffInSec <= 35) {
                currentStatus = "APPROCHE";
                timeHTML = `<span class="full-text">À l'approche</span>`;
                statusClass = "blinking";
            } else {
                currentStatus = `${diffInMin}`;
                timeHTML = `<span class="val">${diffInMin}</span><span class="unit">min</span>`;
            }

            // Animation si le statut a changé (ex: 2 min -> 1 min)
            const hasChanged = lastStatusMap[trainId] !== undefined && lastStatusMap[trainId] !== currentStatus;
            const animClass = hasChanged ? 'animate-text' : '';
            lastStatusMap[trainId] = currentStatus;

            const isNewRow = !currentTrainsData.some(old => (old.FramedVehicleJourneyRef?.DatedVehicleJourneyRef || "x") === (j.FramedVehicleJourneyRef?.DatedVehicleJourneyRef || "y"));
            const platform = (j.MonitoredCall.DeparturePlatformName?.value) || (j.MonitoredCall.DeparturePlatformName) || "2";

            html += `
                <div class="row ${isNewRow ? 'new-row' : ''}">
                    <div class="mission">${mission}</div>
                    <div class="dest">${dest}</div>
                    <div class="time">
                        <div class="time-wrapper ${statusClass} ${animClass}">
                            ${timeHTML}
                        </div>
                    </div>
                    <div class="platform">
                        <div class="platform-box">
                            <span class="platform-text">Quai</span>
                            <span class="platform-num">${platform}</span>
                        </div>
                    </div>
                </div>`;
        });
        board.innerHTML = html;
        currentTrainsData = trains;
    }

    function formatDestination(text) {
        let clean = text.replace(/GARE DE /gi, '').trim().toLowerCase();
        if (clean === "cergy le haut") return "Cergy - Le Haut";
        return clean.split(/([ -])/).map(part => {
            if ([" ", "-"].includes(part)) return part;
            if (["de", "la", "le"].includes(part) && clean.indexOf(part) !== 0) return part;
            return part.charAt(0).toUpperCase() + part.slice(1);
        }).join('');
    }

    // Initialisation
    setInterval(updateClock, 1000);
    updateClock();
    
    fetchSchedules(); // Lance la boucle récursive de 10s
    
    fetchGlobalTraffic();
    setInterval(fetchGlobalTraffic, 120000); // Trafic toutes les 2 min
    setInterval(rotateMessage, 10000); // Rotation message toutes les 10s
</script>
</body>
</html>
