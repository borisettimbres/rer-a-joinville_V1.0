<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIEL RER A - Joinville-le-Pont</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red-a: #c0333a; 
            --dark: #000000;
            --yellow: #fbc02d; 
            --bg-page: #f5f5f5;
            --grey-border: #666;
            --grey-bg: #eee;
            --info-bg: #d0dce4;
            --info-text: #1a3144;
            --ok-color: #00ff00;
            --ko-color: #ff4444;
        }
        body { background: var(--bg-page); font-family: 'Cabin', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--red-a); z-index: 10; }
        .header-left { display: flex; align-items: center; }
        .logos-container { display: flex; gap: 8px; align-items: center; }
        .logo-rer { background: white; border: 2.5px solid var(--dark); border-radius: 8px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: var(--dark); box-sizing: border-box; }
        .logo-a { background: var(--red-a); border-radius: 8px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 900; color: white; box-sizing: border-box; }
        .station-info { margin-left: 15px; }
        .station-name { font-size: 26px; font-weight: bold; color: var(--dark); }
        .direction-info { font-size: 16px; color: var(--red-a); font-weight: bold; }
        .clock { background: var(--dark); color: var(--yellow); padding: 10px 22px; border-radius: 8px; font-size: 28px; font-weight: bold; }
        
        .board { flex-grow: 1; padding: 0 20px; overflow: hidden; display: flex; flex-direction: column; }
        
        .row { 
            display: grid; 
            grid-template-columns: 100px 1fr 240px 100px; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 2px solid #ddd;
            height: 70px;
            transition: all 0.6s ease;
        }
        .row.exit-left { transform: translateX(-120%); opacity: 0; }

        .mission { background: #ddd; padding: 6px; border-radius: 4px; text-align: center; font-weight: bold; font-family: monospace; font-size: 16px; }
        .dest { font-size: 28px; font-weight: 700; padding-left: 15px; color: var(--dark); }
        
        /* Animation du temps d'attente */
        @keyframes timeJump {
            0% { transform: translateY(15px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .animate-text { animation: timeJump 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .blinking { animation: blinker 1.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.2; } }

        .time { background: var(--dark); color: var(--yellow); border-radius: 8px; text-align: center; width: 210px; height: 60px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .time-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .time .val { font-size: 34px; font-weight: bold; line-height: 0.8; }
        .time .unit { font-size: 14px; text-transform: lowercase; font-weight: bold; margin-top: 2px; }
        .time .full-text { font-size: 24px; font-weight: bold; text-transform: uppercase; }

        .platform-box { background: var(--grey-bg); border: 2.5px solid var(--grey-border); border-radius: 8px; width: 60px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--dark); margin-left: auto; }
        .platform-num { font-size: 24px; font-weight: 900; }

        .info-trafic { background: var(--info-bg); height: 110px; display: flex; align-items: center; padding: 0 30px; border-top: 2px solid #b8c5ce; overflow: hidden; }
        .info-icon-container { margin-right: 35px; display: flex; align-items: center; gap: 10px; }
        .icon-info-blue { width: 45px; height: 45px; background: white; border: 3px solid #1a3144; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; color: #1a3144; }
        
        /* Style icône alerte jaune */
        .logo-works { display: none; align-items: center; gap: 8px; }
        .logo-status-warning { width: 48px; height: 48px; background: url('image_0.png') no-repeat center; background-size: contain; }

        .info-scroll-container { flex-grow: 1; overflow: hidden; }
        .info-text { font-size: 24px; font-weight: 700; color: var(--info-text); transition: all 0.5s ease; }
        .slide-up-exit { transform: translateY(-100%); opacity: 0; }
        .slide-up-enter { transform: translateY(100%); opacity: 0; }

        footer { background: #333; color: #aaa; padding: 10px 20px; font-family: monospace; font-size: 11px; display: flex; justify-content: space-between; }
        .api-ok { color: var(--ok-color); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="logos-container"><div class="logo-rer">RER</div><div class="logo-a">A</div></div>
        <div class="station-info">
            <div class="station-name">JOINVILLE-LE-PONT</div>
            <div class="direction-info">Paris · St-Germain-en-Laye · Poissy · Cergy</div>
        </div>
    </div>
    <div class="clock" id="clock">--:--</div>
</header>

<div class="board" id="board"></div>

<div class="info-trafic">
    <div class="info-icon-container">
        <div id="icon-standard" class="icon-info-blue">i</div>
        <div id="icon-works" class="logo-works"><div class="logo-a">A</div><div class="logo-status-warning"></div></div>
    </div>
    <div class="info-scroll-container">
        <div class="info-text" id="traffic-message">Connexion au réseau PRIM...</div>
    </div>
</div>

<footer>
    <div id="debug-schedules">> SIEL : Initialisation...</div>
    <div id="debug-traffic">API Trafic : --</div>
</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const MONITORING_REF = 'STIF:StopArea:SP:70640:';
    const DEFAULT_MSG = "Attentifs, ensemble • Signaler tout objet abandonné ou situation inhabituelle";

    let currentTrains = [];
    let lastStatusMap = {}; 
    let isTransitioning = false;
    let displayQueue = [{text: DEFAULT_MSG, type: 'default'}];
    let queueIndex = 0;

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    /** LOGIQUE TRAFIC (Rotation 5s) **/
    async function fetchTraffic() {
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/general-message?LineRef=STIF:Line::C01742:`;
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        try {
            const response = await fetch(proxy, { headers: { 'apiKey': API_KEY, 'Accept': 'application/json' } });
            const data = await response.json();
            const messages = data.Siri?.ServiceDelivery?.GeneralMessageDelivery?.[0]?.InfoMessage || [];
            let newQueue = [{text: DEFAULT_MSG, type: 'default'}];
            messages.forEach(m => {
                const msgs = m.Content?.Message || [];
                const text = msgs[0]?.MessageText?.value || "";
                if (text) newQueue.push({text: text, type: 'works'});
            });
            displayQueue = newQueue;
            document.getElementById('debug-traffic').innerHTML = '<span class="api-ok">TRAFIC OK</span>';
        } catch (e) { console.error(e); }
    }

    function rotateMessage() {
        const txtNode = document.getElementById('traffic-message');
        const iconStd = document.getElementById('icon-standard');
        const iconWorks = document.getElementById('icon-works');
        
        txtNode.classList.add('slide-up-exit');
        setTimeout(() => {
            queueIndex = (queueIndex + 1) % displayQueue.length;
            const current = displayQueue[queueIndex];
            txtNode.innerText = current.text;
            iconStd.style.display = current.type === 'default' ? 'flex' : 'none';
            iconWorks.style.display = current.type === 'works' ? 'flex' : 'none';
            txtNode.classList.remove('slide-up-exit');
            txtNode.classList.add('slide-up-enter');
            setTimeout(() => txtNode.classList.remove('slide-up-enter'), 500);
        }, 500);
    }

    /** LOGIQUE SIEL (Correctif Ghost Trains) **/
    async function fetchSchedules() {
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${MONITORING_REF}`;
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        try {
            const response = await fetch(proxy, { headers: { 'apiKey': API_KEY, 'Accept': 'application/json' } });
            const data = await response.json();
            const visits = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]?.MonitoredStopVisit || [];
            processUpdate(visits);
            document.getElementById('debug-schedules').innerHTML = `> SIEL OK - ${new Date().toLocaleTimeString()}`;
        } catch (e) { console.error(e); }
        finally { setTimeout(fetchSchedules, 10000); }
    }

    function processUpdate(visits) {
        const now = new Date();
        const seen = new Set();
        
        const filtered = visits.map(v => v.MonitoredVehicleJourney).filter(j => {
            const expTime = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            // ANTI-GHOST : Supprimer si retard > 40s
            if ((now - expTime) > 40000) return false;
            
            const key = (j.FramedVehicleJourneyRef?.DatedVehicleJourneyRef) || j.MonitoredCall.AimedDepartureTime;
            if (seen.has(key)) return false;
            seen.add(key);

            const dest = j.DestinationName[0].value.toLowerCase();
            return !dest.includes('boissy') && !dest.includes('varenne');
        })
        .sort((a, b) => new Date(a.MonitoredCall.ExpectedDepartureTime || a.MonitoredCall.AimedDepartureTime) - new Date(b.MonitoredCall.ExpectedDepartureTime || b.MonitoredCall.AimedDepartureTime))
        .slice(0, 6);

        if (!isTransitioning && currentTrains.length > 0 && filtered.length > 0) {
            if (currentTrains[0].FramedVehicleJourneyRef?.DatedVehicleJourneyRef !== filtered[0].FramedVehicleJourneyRef?.DatedVehicleJourneyRef) {
                triggerDeparture(filtered);
                return;
            }
        }
        if (!isTransitioning) render(filtered);
    }

    function triggerDeparture(newTrains) {
        const first = document.querySelector('.row');
        if (first) {
            isTransitioning = true;
            first.classList.add('exit-left');
            setTimeout(() => { isTransitioning = false; render(newTrains); }, 600);
        } else { render(newTrains); }
    }

    function render(trains) {
        const board = document.getElementById('board');
        const now = new Date();
        let html = '';

        trains.forEach(j => {
            const mission = j.JourneyNote?.[0]?.value || "----";
            const dest = j.DestinationName[0].value.replace(/GARE DE /gi, '');
            const expTime = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            const diffSec = Math.floor((expTime - now) / 1000);
            const diffMin = Math.ceil(diffSec / 60);
            const isAtStop = j.MonitoredCall.VehicleAtStop === true || j.MonitoredCall.VehicleAtStop === "true";
            
            let statusKey = "";
            let timeHtml = "";
            let statusClass = "";

            if (isAtStop || diffSec <= 5) {
                statusKey = "QUAI";
                timeHtml = `<span class="full-text">À quai</span>`;
            } else if (diffSec <= 35) {
                statusKey = "APPROCHE";
                timeHtml = `<span class="full-text blinking">À l'approche</span>`;
            } else {
                statusKey = `${diffMin}min`;
                timeHtml = `<span class="val">${diffMin}</span><span class="unit">min</span>`;
            }

            const trainId = j.FramedVehicleJourneyRef?.DatedVehicleJourneyRef || mission;
            const hasChanged = lastStatusMap[trainId] !== undefined && lastStatusMap[trainId] !== statusKey;
            const animClass = hasChanged ? 'animate-text' : '';
            lastStatusMap[trainId] = statusKey;

            const platform = j.MonitoredCall.DeparturePlatformName?.value || "2";

            html += `
                <div class="row">
                    <div class="mission">${mission}</div>
                    <div class="dest">${dest}</div>
                    <div class="time">
                        <div class="time-wrapper ${animClass}">${timeHtml}</div>
                    </div>
                    <div class="platform-box"><span class="platform-num">${platform}</span></div>
                </div>`;
        });
        board.innerHTML = html;
        currentTrains = trains;
    }

    updateClock();
    setInterval(updateClock, 1000);
    fetchSchedules();
    fetchTraffic();
    setInterval(fetchTraffic, 60000);
    setInterval(rotateMessage, 5000); // 5 secondes pour les messages
</script>
</body>
</html>
